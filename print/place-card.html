<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Сфера · Карточка места · Мягкая сила</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─── Параметры печати A4 ─── */
    @page {
      size: A4 portrait;
      margin: 0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:      #FAF7F0;
      --paper-2:    #F4EFE3;
      --gold:       #8C7649;     /* глубже на светлом — для контраста */
      --gold-soft:  #B69968;     /* мягкое золото для деталей */
      --graphite:   #2A2520;
      --graphite-2: rgba(42, 37, 32, 0.62);
      --hairline:   rgba(42, 37, 32, 0.22);
      --serif:      'Cormorant Garamond', 'Times New Roman', serif;
      --sans:       'Inter', system-ui, sans-serif;
    }

    /* ─── Wrapper для preview в браузере ─── */
    body {
      background: #2a2520;
      font-family: var(--serif);
      color: var(--graphite);
      -webkit-font-smoothing: antialiased;
      padding: 30px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Контролы для preview — скрыты при печати */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--sans);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: rgba(234, 230, 220, 0.7);
      background: rgba(0,0,0,0.5);
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(182, 153, 104, 0.3);
    }
    .controls input {
      width: 64px;
      background: transparent;
      border: 1px solid rgba(182, 153, 104, 0.5);
      color: var(--gold-soft);
      font-family: var(--serif);
      font-size: 1rem;
      text-align: center;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .controls button {
      background: var(--gold-soft);
      color: #0E0E0E;
      border: 0;
      padding: 8px 16px;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 999px;
    }
    .controls button:hover { background: #C9A977; }

    /* ─── A4 страница ─── */
    .a4 {
      width: 210mm;
      height: 297mm;
      background:
        radial-gradient(ellipse at 50% 38%, rgba(140, 118, 73, 0.07) 0%, transparent 55%),
        var(--paper);
      color: var(--graphite);
      padding: 22mm 18mm;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 60px rgba(0, 0, 0, 0.5);
    }

    /* Декоративные орбиты на фоне */
    .a4-orbits {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180mm;
      height: 180mm;
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }
    .a4 > *:not(.a4-orbits) { position: relative; z-index: 1; }

    /* Hairline-рамка по краям */
    .a4-frame {
      position: absolute;
      top: 12mm;
      left: 12mm;
      right: 12mm;
      bottom: 12mm;
      border: 0.4mm solid var(--hairline);
      pointer-events: none;
      z-index: 0;
    }
    .a4-frame::before, .a4-frame::after {
      content: '';
      position: absolute;
      width: 4mm;
      height: 4mm;
      border: 0.6mm solid var(--gold);
    }
    .a4-frame::before {
      top: -2mm; left: -2mm;
      border-right: 0; border-bottom: 0;
    }
    .a4-frame::after {
      bottom: -2mm; right: -2mm;
      border-left: 0; border-top: 0;
    }

    /* ─── Брендинг сверху ─── */
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4mm;
    }
    .brand-mark {
      width: 10mm;
      height: 10mm;
      color: var(--gold);
    }
    .brand-word {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 5mm;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      padding-left: 0.4em;
    }

    /* Подпись клуба под бренд-роу */
    .brand-tagline {
      text-align: center;
      font-family: var(--sans);
      font-size: 2.4mm;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-top: 5mm;
    }

    /* Космический орнаментный фриз */
    .cosmos-ornament {
      display: block;
      width: 160mm;
      height: 22mm;
      margin: 8mm auto 4mm;
    }

    /* ─── Метка «Ваше место» ─── */
    .place-label {
      text-align: center;
      font-family: var(--sans);
      font-size: 2.6mm;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--graphite-2);
      margin-top: 4mm;
    }

    /* ─── Главная — цифра в центре сферы ─── */
    .place {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    /* Орбиты — абсолютно по центру зоны */
    .place-orbits {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150mm;
      height: 150mm;
      opacity: 0.7;
      pointer-events: none;
    }
    /* Цифра как SVG-текст — математически центрирована на (100,100) */
    .place-num-svg {
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: 86px;          /* в единицах viewBox 0..200 */
      fill: var(--gold);
      letter-spacing: -2px;
    }

    /* ─── Тема встречи ─── */
    .theme {
      text-align: center;
      padding-top: 6mm;
      border-top: 0.3mm solid var(--hairline);
    }
    .theme-label {
      font-family: var(--sans);
      font-size: 2.4mm;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
      margin-bottom: 5mm;
    }
    .theme-title {
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: 22mm;
      letter-spacing: 0.005em;
      color: var(--graphite);
      line-height: 1;
    }
    .theme-ornament {
      display: inline-block;
      margin-top: 4mm;
      font-family: var(--serif);
      color: var(--gold);
      font-size: 5mm;
      letter-spacing: 0.5em;
    }
    .quote {
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: 11mm;
      line-height: 1.25;
      letter-spacing: 0.005em;
      color: var(--graphite);
      text-align: center;
      max-width: 150mm;
      margin: 0 auto;
    }

    /* ─── Нижний footer ─── */
    .footer-meta {
      text-align: center;
      margin-top: 8mm;
      font-family: var(--sans);
      font-size: 2.4mm;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(42, 37, 32, 0.48);
    }
    .footer-meta .dot { color: var(--gold); margin: 0 0.7em; }

    /* ─── PRINT режим ─── */
    @media print {
      body {
        background: white;
        padding: 0;
        min-height: auto;
        gap: 0;
      }
      .controls { display: none !important; }
      .a4 {
        box-shadow: none;
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Контролы для preview — на печать не идут -->
  <div class="controls">
    <span>Номер места:</span>
    <input type="text" id="numInput" value="10" maxlength="3" />
    <button onclick="window.print()">Печать / PDF</button>
  </div>

  <div class="a4">
    <!-- Hairline-рамка с уголками -->
    <div class="a4-frame"></div>

    <!-- ━━━ Брендинг ━━━ -->
    <div class="brand-row">
      <svg class="brand-mark" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18.4" fill="none" stroke="currentColor" stroke-width="0.7"/>
        <circle cx="20" cy="20" r="13.2" fill="none" stroke="currentColor" stroke-width="0.45" opacity="0.55"/>
        <circle cx="24.6" cy="13" r="1.3" fill="currentColor"/>
      </svg>
      <div class="brand-word">Сфера</div>
    </div>
    <div class="brand-tagline">Ужин «Мягкая&nbsp;сила» · 2026</div>

    <!-- ━━━ Космический фриз — орбиты, планеты, звёзды ━━━ -->
    <svg class="cosmos-ornament" viewBox="0 0 400 56" aria-hidden="true">
      <!-- центральная hairline-ось -->
      <line x1="20" y1="28" x2="380" y2="28" stroke="#8C7649" stroke-width="0.25" opacity="0.32"/>

      <!-- широкая эллиптическая орбита через всё -->
      <ellipse cx="200" cy="28" rx="170" ry="14" fill="none" stroke="#8C7649" stroke-width="0.35" opacity="0.55"/>

      <!-- центральная сфера (солнце клуба) -->
      <circle cx="200" cy="28" r="6.4" fill="none" stroke="#8C7649" stroke-width="0.5"/>
      <circle cx="200" cy="28" r="4" fill="none" stroke="#8C7649" stroke-width="0.35" opacity="0.55"/>
      <circle cx="202.5" cy="25" r="0.85" fill="#8C7649"/>

      <!-- Сатурн справа с кольцом -->
      <ellipse cx="310" cy="28" rx="10.5" ry="2.2" fill="none" stroke="#8C7649" stroke-width="0.35" opacity="0.7"/>
      <circle cx="310" cy="28" r="3.4" fill="#8C7649" opacity="0.9"/>

      <!-- маленькая планета слева -->
      <circle cx="80" cy="28" r="2.6" fill="#8C7649" opacity="0.85"/>

      <!-- ещё крошечная планета -->
      <circle cx="125" cy="28" r="1.3" fill="#8C7649" opacity="0.7"/>

      <!-- комета — стилизованная траектория (как с фото Гагарина) -->
      <path d="M 350 12 Q 365 14 372 22" fill="none" stroke="#8C7649" stroke-width="0.4" opacity="0.55" stroke-linecap="round"/>
      <circle cx="372" cy="22" r="0.85" fill="#8C7649"/>

      <!-- россыпь звёзд -->
      <circle cx="30" cy="14" r="0.6" fill="#8C7649" opacity="0.7"/>
      <circle cx="50" cy="42" r="0.5" fill="#8C7649" opacity="0.55"/>
      <circle cx="155" cy="10" r="0.55" fill="#8C7649" opacity="0.65"/>
      <circle cx="170" cy="46" r="0.45" fill="#8C7649" opacity="0.5"/>
      <circle cx="240" cy="12" r="0.5" fill="#8C7649" opacity="0.6"/>
      <circle cx="260" cy="44" r="0.6" fill="#8C7649" opacity="0.7"/>
      <circle cx="288" cy="14" r="0.45" fill="#8C7649" opacity="0.5"/>
      <circle cx="345" cy="40" r="0.5" fill="#8C7649" opacity="0.6"/>
    </svg>

    <!-- ━━━ Большая цифра места — вписана в центр сферы ━━━ -->
    <div class="place-label">Ваше место</div>
    <div class="place">
      <svg class="place-orbits" viewBox="0 0 200 200" aria-hidden="true">
        <defs>
          <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#8C7649" stop-opacity="0.07"/>
            <stop offset="100%" stop-color="#8C7649" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="98" fill="url(#orbGlow)"/>
        <circle cx="100" cy="100" r="90" fill="none" stroke="#2A2520" stroke-width="0.22" opacity="0.32"/>
        <circle cx="100" cy="100" r="68" fill="none" stroke="#2A2520" stroke-width="0.2" opacity="0.22"/>
        <circle cx="100" cy="100" r="46" fill="none" stroke="#2A2520" stroke-width="0.18" opacity="0.16"/>
        <circle cx="124" cy="35" r="0.9" fill="#8C7649"/>
        <circle cx="63" cy="156" r="0.7" fill="#8C7649" opacity="0.65"/>
        <!-- Цифра математически центрирована на (100,100) -->
        <text class="place-num-svg" x="100" y="100" text-anchor="middle"
              dominant-baseline="central" id="placeNumber">10</text>
      </svg>
    </div>

    <!-- ━━━ Цитата ━━━ -->
    <div class="theme">
      <div class="theme-ornament" style="margin-top: 0; margin-bottom: 5mm;">· · ·</div>
      <p class="quote">Мы&nbsp;становимся теми,<br/>кого&nbsp;выбираем рядом.</p>
    </div>

    <!-- ━━━ Footer ━━━ -->
    <div class="footer-meta">
      Marina Lodvikova
      <span class="dot">·</span>
      Москва
    </div>
  </div>

  <script>
    // Параметр ?n=N в URL — подставляет цифру
    const params = new URLSearchParams(location.search);
    const fromUrl = params.get('n');
    const numEl = document.getElementById('placeNumber');
    const input = document.getElementById('numInput');

    if (fromUrl) {
      numEl.textContent = fromUrl;
      input.value = fromUrl;
    }

    input.addEventListener('input', (e) => {
      const v = e.target.value.replace(/\D/g, '').slice(0, 3);
      e.target.value = v;
      numEl.textContent = v || '0';
    });
  </script>
</body>
</html>
